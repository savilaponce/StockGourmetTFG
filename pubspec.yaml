name: stockgourmet
description: Gestión inteligente de inventario y costes para restaurantes.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  # Supabase
  supabase_flutter: ^2.5.0
  
  # Estado y navegación
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0
  go_router: ^14.0.0
  
  # UI
  google_fonts: ^6.2.0
  flutter_svg: ^2.0.0
  
  # Utilidades
  flutter_dotenv: ^5.1.0
  intl: 0.20.2
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.0

flutter:
  uses-material-design: true
  
  assets:
    - .env
